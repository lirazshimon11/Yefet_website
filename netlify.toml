# netlify.toml

[build]
  command = "npm ci && npm run build"
  publish = "dist"

# שליחת API ל-Render
[[redirects]]
  from = "/api/*"
  to   = "https://yafet-website.onrender.com/api/:splat"
  status = 200
  force  = true     # רק לכלל ה-API

# הבטחת גישה ישירה לסטטיים (לא חובה, אבל מונע טעויות אם מישהו ישים force על SPA)
[[redirects]]
  from = "/assets/*"
  to   = "/assets/:splat"
  status = 200

# SPA fallback — שים לב: בלי force!
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200
