name: Keep Render Awake
on:
  schedule:
    - cron: "*/10 * * * *"     # כל 10 דקות
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    env:
      APP_URL: "https://yafet-website.onrender.com"   # ← עדכני אם צריך
    steps:
      - name: Warm up (root)
        run: |
          echo "Warming up $APP_URL ..."
          curl -fSL --retry 5 --retry-all-errors --connect-timeout 10 --max-time 60 \
            "$APP_URL/?cb=$(date +%s)"

      - name: Sleep a bit
        run: sleep 5

      - name: Ping health endpoint
        run: |
          echo "Pinging $APP_URL/api/health ..."
          curl -fSL --retry 5 --retry-all-errors --connect-timeout 10 --max-time 60 \
            "$APP_URL/api/health?cb=$(date +%s)"
