name: Keep Render Awake
on:
  schedule:
    - cron: "*/10 * * * *"     # כל 10 דקות
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    env:
      API_BASE: "https://yafet-website.onrender.com/api"  # ← אם יש לך base אחר, עדכני כאן
    steps:
      # Warm-up: פינג עדין ל-health, לא נופלים על 404/5xx כדי פשוט "להעיר" את השירות
      - name: Warm up health (non-fatal)
        run: |
          echo "Warming up $API_BASE/health ..."
          curl -sS -L --retry 5 --retry-all-errors --connect-timeout 10 --max-time 60 \
            "$API_BASE/health?cb=$(date +%s)" || true

      - name: Short sleep
        run: sleep 5

      # בדיקה מחייבת הצלחה (2xx/3xx) עם חלון זמן גדול יותר ל-cold start
      - name: Verify health (must succeed)
        run: |
          echo "Verifying $API_BASE/health ..."
          curl -fSL --retry 5 --retry-all-errors --connect-timeout 10 --max-time 90 \
            "$API_BASE/health?cb=$(date +%s)"
