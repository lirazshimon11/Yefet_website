name: Nightly Leads Backup

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  BASE_URL: ${{ secrets.RENDER_BASE_URL }}   # למשל: https://yafet-website.onrender.com
  KEY: ${{ secrets.EXPORT_KEY }}

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Wake Render (health)
        run: |
          set -euo pipefail
          for i in {1..6}; do
            echo "Ping ${BASE_URL%/}/api/health (try $i/6)…"
            if curl -fsS --max-time 20 "${BASE_URL%/}/api/health" -o /dev/null; then
              echo "Service is up."
              break
            fi
            echo "Still waking up… sleep 15s"
            sleep 15
          done

      - name: Trigger snapshot on Render (optional but recommended)
        run: |
          set -euo pipefail
          # משתמשים ב-GET + data-urlencode כדי לקודד את הפרמטרים כראוי
          curl -fsS --retry 5 --retry-connrefused --retry-delay 5 \
            --get "${BASE_URL%/}/api/backup/snapshot" \
            --data-urlencode "key=${KEY}" \
            -o /dev/null || true

      - name: Export CSV from Render
        run: |
          mkdir -p backups
          TS="$(date +'%d-%m-%Y--%H-%M-%S')"   # חדש: תאריך ושעה לפי ישראל (שרת ה־runner לפי UTC אבל בלי Z)
          curl -fsS --retry 5 --retry-connrefused --retry-delay 5 --max-time 180 \
            "$BASE_URL/api/export/csv?key=$KEY" \
            -o "backups/leads-${TS}.csv"

      - name: Prune old backups (keep ~180 days)
        run: |
          find backups -type f -name 'leads-*.csv' -mtime +180 -print -delete || true

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backups/*.csv || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(backup): export leads CSV"
            git pull --rebase || true
            git push
          fi
