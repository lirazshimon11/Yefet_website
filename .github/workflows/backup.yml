name: Nightly Leads Backup

on:
  schedule:
    - cron: "0 1 * * *"   # כל יום ב-01:00 UTC
  workflow_dispatch:       # גם הפעלה ידנית

permissions:
  contents: write          # נדרש לדחיפת הקבצים חזרה לריפו

env:
  BASE_URL: ${{ secrets.RENDER_BASE_URL }}
  KEY: ${{ secrets.EXPORT_KEY }}

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # מעיר את השירות ברנדר (cold start) לפני הייצוא
      - name: Wake Render (health)
        run: |
          for i in {1..6}; do
            echo "Ping $BASE_URL/api/health (try $i/6)..."
            if curl -fsS --max-time 20 "$BASE_URL/api/health" -o /dev/null; then
              echo "Service is up."
              break
            fi
            echo "Still waking up... sleep 15s"
            sleep 15
          done

      - name: Trigger snapshot on Render (optional but recommended)
        run: |
          curl -fsS --retry 5 --retry-connrefused --retry-delay 5 \
            "$BASE_URL/api/backup/snapshot?key=$KEY" \
            -o /dev/null || true

      - name: Export CSV from Render
        run: |
          mkdir -p backups
          TS="$(date -u +'%Y-%m-%dT%H-%M-%SZ')"
          curl -fsS --retry 5 --retry-connrefused --retry-delay 5 --max-time 180 \
            "$BASE_URL/api/export/csv?key=$KEY" \
            -o "backups/leads-${TS}.csv"

      - name: Prune old backups (keep ~180 days)
        run: |
          find backups -type f -name 'leads-*.csv' -mtime +180 -print -delete || true

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backups/*.csv || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(backup): export leads CSV"
            git pull --rebase || true
            git push
          fi
